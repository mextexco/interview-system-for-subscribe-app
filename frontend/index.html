<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview System - 音声対話型プロファイリング</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎤</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- メインコンテナ -->
    <div class="main-container">
        <!-- 左ペイン: チャット -->
        <div class="left-pane">
            <!-- キャラクターアバター -->
            <div class="character-avatar" id="characterAvatar">
                <div class="avatar-info">
                    <div class="app-title">
                        <span class="app-icon">🎤</span>
                        <span class="app-name">Interview</span>
                    </div>
                    <div class="avatar-placeholder">
                        <span id="avatarEmoji">👤</span>
                    </div>
                    <p class="character-name" id="characterNameDisplay">-</p>
                    <div class="status-info">
                        <div class="lm-status" id="lmStatus">
                            <span id="lmStatusText">確認中...</span>
                        </div>
                        <div class="model-name" id="modelName">-</div>
                    </div>
                    <div class="version-info" id="versionInfo">
                        <div class="version-item">
                            <span class="version-label">Backend:</span>
                            <span class="version-value" id="backendVersion">-</span>
                        </div>
                        <div class="version-item">
                            <span class="version-label">Frontend:</span>
                            <span class="version-value" id="frontendVersion">5.0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- チャット領域 -->
            <div class="chat-container" id="chatContainer">
                <!-- メッセージはJavaScriptで動的に追加 -->
            </div>

            <!-- 入力エリア -->
            <div class="input-area">
                <button id="micButton" class="mic-button" title="音声入力を開始">🎙️</button>
                <input
                    type="text"
                    id="messageInput"
                    placeholder="メッセージを入力..."
                    disabled
                />
                <button id="sendButton" disabled>送信</button>
                <button id="undoButton" class="undo-button" title="最後のやりとりを取り消す" disabled>↩️</button>
                <span id="speakerIcon" class="speaker-icon" title="音声出力">🔇</span>
            </div>

            <!-- 音声設定 -->
            <div class="voice-settings">
                <label class="voice-setting-label">
                    <input type="checkbox" id="continuousVoiceMode" />
                    <span>🎤 継続音声入力モード（ボタンを押すまで録音継続）</span>
                </label>
            </div>
        </div>

        <!-- 右ペイン: プロファイルビジュアライゼーション -->
        <div class="right-pane">
            <!-- 最近の抽出データ -->
            <div class="recent-data-section">
                <div class="recent-data-list" id="recentDataList">
                    <p class="no-data">まだデータがありません</p>
                </div>
            </div>

            <!-- プロファイルマインドマップ -->
            <div class="profile-visualizer-section">
                <div id="profileVisualizerContainer" style="width: 100%; height: calc(100vh - 150px); min-height: 600px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;"></div>
            </div>

            <!-- バッジセクション -->
            <div class="badges-section" id="badgesSection">
                <h3 class="collapsible" id="badgesToggle">
                    獲得バッジ <span id="badgeCount">(0)</span>
                    <span class="toggle-icon">▼</span>
                </h3>
                <div class="badges-content" id="badgesContent">
                    <div class="badges-container" id="badgesContainer">
                        <p class="no-badges">まだバッジがありません</p>
                    </div>
                </div>
            </div>

            <!-- ステータスセクション（折りたたみ可） -->
            <div class="status-section">
                <h3 class="collapsible" id="statusToggle">
                    ステータス
                    <span class="toggle-icon">▼</span>
                </h3>
                <div class="status-content" id="statusContent">
                    <div class="status-bars" id="statusBars">
                        <!-- カテゴリー別プログレスバー -->
                    </div>
                    <div class="status-summary">
                        <p>総会話回数: <span id="sessionCount">0</span></p>
                        <p>総情報数: <span id="totalDataCount">0</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- スタート画面（モーダル） -->
    <div class="modal" id="startModal">
        <div class="modal-content">
            <h2>面接を始めます</h2>
            <p>担当キャラクターを選んでください</p>
            <div class="gender-buttons">
                <button class="gender-btn" data-gender="男性">
                    <span class="char-name">青山くん</span>
                    <span class="char-desc">落ち着いた男性</span>
                </button>
                <button class="gender-btn" data-gender="女性">
                    <span class="char-name">つむぎちゃん</span>
                    <span class="char-desc">明るい女性</span>
                </button>
                <button class="gender-btn" data-gender="その他">
                    <span class="char-name">ずんだもん</span>
                    <span class="char-desc">親しみやすい</span>
                </button>
            </div>
        </div>
    </div>

    <!-- バッジ獲得演出（モーダル） -->
    <div class="badge-modal hidden" id="badgeModal">
        <div class="badge-modal-content">
            <div class="badge-flash"></div>
            <h2>🎉 バッジ獲得！</h2>
            <div class="badge-display" id="badgeDisplay">
                <span class="badge-icon" id="newBadgeIcon">🏆</span>
                <p class="badge-name" id="newBadgeName">バッジ名</p>
            </div>
            <button class="close-badge-btn" id="closeBadgeBtn">続ける</button>
        </div>
    </div>

    <!-- ランダムイベント（モーダル） -->
    <div class="event-modal hidden" id="eventModal">
        <div class="event-modal-content">
            <h2 id="eventTitle">イベント</h2>
            <p class="event-question" id="eventContent">質問内容</p>

            <!-- 選択肢（二択クイズ用） -->
            <div class="event-choices" id="eventChoices"></div>

            <!-- 入力欄（自由回答用） -->
            <div class="event-input" id="eventInput">
                <textarea
                    id="eventInputField"
                    placeholder="自由に答えてください..."
                    rows="4"
                ></textarea>
                <div class="event-buttons">
                    <button class="event-submit-btn" id="eventSubmitBtn">回答する</button>
                    <button class="event-skip-btn" id="eventSkipBtn">スキップ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScriptファイル -->
    <!-- API_BASE_URL を最初に定義 -->
    <script>
        // API Base URL (全スクリプトで共有)
        const API_BASE_URL = 'http://localhost:5001/api';
    </script>
    <script src="js/voice.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/events.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/character.js"></script>
    <script src="js/gamification.js"></script>

    <!-- React Profile Visualizer -->
    <link rel="stylesheet" href="dist/assets/visualizer.css">
    <script type="module" src="dist/assets/visualizer.js"></script>

    <script>
        // プロファイルビジュアライザーのインスタンス（グローバルに公開）
        window.profileVisualizer = null;

        // アプリ初期化
        document.addEventListener('DOMContentLoaded', () => {
            // LM Studio接続チェック
            checkLMStudioConnection();

            // バージョン情報取得
            fetchVersionInfo();

            // スタートモーダル表示
            showStartModal();

            // ステータスセクション折りたたみ
            setupStatusToggle();

            // プロファイルビジュアライザー初期化（少し遅延させてReactの読み込みを待つ）
            setTimeout(() => {
                if (window.initProfileVisualizer) {
                    window.profileVisualizer = window.initProfileVisualizer('profileVisualizerContainer');
                    console.log('[App] Profile Visualizer initialized');
                } else {
                    console.error('[App] initProfileVisualizer not found');
                    // リトライ（モジュール読み込みが遅い場合）
                    setTimeout(() => {
                        if (window.initProfileVisualizer) {
                            window.profileVisualizer = window.initProfileVisualizer('profileVisualizerContainer');
                            console.log('[App] Profile Visualizer initialized (retry)');
                        } else {
                            console.error('[App] initProfileVisualizer still not found after retry');
                        }
                    }, 1000);
                }
            }, 100);
        });
    </script>

    <!-- クレジット表記 / Credits -->
    <div class="credits-footer">
        <p>©︎ <a href="https://zunko.jp/" target="_blank">SSS/東北ずん子</a> (ずんだもん) | <a href="https://tsumugi-official.studio.site/" target="_blank">春日部つむぎ</a> | 青山龍星 | <a href="https://voicevox.hiroshiba.jp/" target="_blank">VOICEVOX</a></p>
    </div>
</body>
</html>
